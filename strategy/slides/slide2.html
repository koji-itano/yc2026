<!DOCTYPE html>
<html><head><style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #FFFFFF; font-family: Arial, sans-serif; display: flex; flex-direction: column; }
.header { margin: 30pt 40pt 0 40pt; }
h1 { color: #1A1A2E; font-size: 28pt; margin: 0 0 6pt 0; }
.underline { width: 40pt; height: 3pt; background: #F96D00; margin: 0 0 20pt 0; }
.content { margin: 0 40pt; display: flex; flex-direction: column; }
.problem { margin: 0 0 14pt 0; padding: 16pt; background: #F5F5F5; border-radius: 6pt; border-left: 4pt solid #F96D00; }
.problem h3 { color: #F96D00; font-size: 13pt; margin: 0 0 4pt 0; }
.problem p { color: #333333; font-size: 11pt; margin: 0; line-height: 1.4; }
</style></head><body>
<div class="header">
  <h1>課題: 3つのギャップ</h1>
  <div class="underline"></div>
</div>
<div class="content">
  <div class="problem">
    <h3>1. 熟練工が足りない</h3>
    <p>日本の製造業の65.9%が指導人材不足を報告（ものづくり白書2025）。グローバルで加速中。</p>
  </div>
  <div class="problem">
    <h3>2. AIは物理作業ができない</h3>
    <p>AIは推論・計画・支払いができる。でもバルブを回せない、溶接を検査できない、ボルトを締められない。ヒューマノイドはまだ高すぎる。</p>
  </div>
  <div class="problem">
    <h3>3. 「人を見つける」だけでは不十分</h3>
    <p>企業が欲しいのは人材マッチングだけじゃない。安全な実行、ステップバイステップのガイダンス、完了検証、監査ログが必要。</p>
  </div>
</div>
</body></html>
